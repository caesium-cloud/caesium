<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caesium · Operator Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#050709"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  <g transform="translate(100,100)" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.9">
    <ellipse rx="44" ry="16"/>
    <ellipse rx="44" ry="16" transform="rotate(60)"/>
    <ellipse rx="44" ry="16" transform="rotate(120)"/>
    <circle r="6" fill="#facc15" stroke="none"/>
  </g>
</svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="layout.jsx"></script>
<script type="text/babel" src="pages-jobs.jsx"></script>
<script type="text/babel" src="pages-other.jsx"></script>
<script type="text/babel" src="pages-system.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "accent": "cyan",
  "badgeStyle": "filled",
  "showSparklines": true,
  "logoAnimated": true,
  "rowHover": "subtle"
}/*EDITMODE-END*/;

function App() {
  const [route, setRoute] = useState("jobs");
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Tweaks protocol — register listener BEFORE announcing
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const setTweak = (key, val) => {
    setTweaks((t) => {
      const next = { ...t, [key]: val };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");
      return next;
    });
  };

  const navigate = (to) => setRoute(to);
  const openJob = (jobId) => setRoute(`jobs/${jobId}`);
  const openRun = (jobId, runId) => setRoute(`jobs/${jobId}/runs/${runId}`);
  const goBack = () => {
    const parts = route.split("/");
    if (parts.length >= 4) setRoute(`${parts[0]}/${parts[1]}`);
    else setRoute(parts[0]);
  };

  const seg = route.split("/");
  let page = null;
  if (seg[0] === "jobs" && seg.length === 1) {
    page = <window.PAGES.JobsPage onOpen={openJob} density={tweaks.density} badgeStyle={tweaks.badgeStyle} accent={tweaks.accent} showSparklines={tweaks.showSparklines} rowHover={tweaks.rowHover} />;
  } else if (seg[0] === "jobs" && seg.length === 2) {
    page = <window.PAGES.JobDetailPage jobId={seg[1]} onBack={() => navigate("jobs")} onOpenRun={openRun} accent={tweaks.accent} badgeStyle={tweaks.badgeStyle} />;
  } else if (seg[0] === "jobs" && seg.length === 4) {
    page = <window.PAGES2.RunDetailPage jobId={seg[1]} runId={seg[3]} onBack={() => navigate(`jobs/${seg[1]}`)} />;
  } else if (route === "stats") {
    page = <window.PAGES2.StatsPage />;
  } else if (route === "triggers") {
    page = <window.PAGES2.TriggersPage />;
  } else if (route === "atoms") {
    page = <window.PAGES2.PlaceholderPage title="Atoms" eyebrow="Container library" hint="Reusable container images registered as atoms appear here. Each atom is a versioned, immutable execution unit." />;
  } else if (route === "system") {
    page = <window.PAGES3.SystemPage />;
  } else if (route === "jobdefs") {
    page = <window.PAGES3.JobDefsPage />;
  } else {
    page = <window.PAGES.JobsPage onOpen={openJob} density={tweaks.density} badgeStyle={tweaks.badgeStyle} accent={tweaks.accent} />;
  }

  return (
    <div data-screen-label={`Caesium / ${route}`} style={{ display: "flex", height: "100vh", width: "100vw", overflow: "hidden", background: "hsl(var(--void))" }}>
      <window.LAYOUT.Sidebar route={route} onNavigate={navigate} density={tweaks.density} logoAnimated={tweaks.logoAnimated} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <window.LAYOUT.Header route={route} onNavigate={navigate} />
        <div style={{ flex: 1, minHeight: 0, overflow: "hidden" }}>
          {page}
        </div>
      </div>
      {tweaksOpen ? <TweaksUI tweaks={tweaks} setTweak={setTweak} onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*"); }} /> : null}
    </div>
  );
}

function TweaksUI({ tweaks, setTweak, onClose }) {
  const Section = ({ title, children }) => (
    <div style={{ padding: "14px 16px", borderBottom: "1px solid hsl(var(--graphite) / 0.5)" }}>
      <div className="eyebrow" style={{ marginBottom: 10, color: "hsl(var(--gold) / 0.85)" }}>{title}</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{children}</div>
    </div>
  );
  const Radio = ({ label, k, options }) => (
    <div>
      <div style={{ fontSize: 11, color: "hsl(var(--text-3))", marginBottom: 6 }}>{label}</div>
      <div style={{ display: "flex", gap: 2, padding: 2, background: "hsl(var(--void))", border: "1px solid hsl(var(--graphite))", borderRadius: 6 }}>
        {options.map((o) => {
          const on = tweaks[k] === o.v;
          return (
            <button key={o.v} onClick={() => setTweak(k, o.v)} style={{
              flex: 1, padding: "6px 8px", borderRadius: 4, border: "none", cursor: "pointer",
              background: on ? "hsl(var(--cyan) / 0.18)" : "transparent",
              color: on ? "hsl(var(--cyan-glow))" : "hsl(var(--text-2))",
              fontSize: 11, fontWeight: on ? 600 : 400, textTransform: "capitalize",
            }}>{o.l}</button>
          );
        })}
      </div>
    </div>
  );
  const Toggle = ({ label, k }) => (
    <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", fontSize: 12, color: "hsl(var(--text-2))" }}>
      <span>{label}</span>
      <button onClick={() => setTweak(k, !tweaks[k])} style={{
        width: 32, height: 18, borderRadius: 10, border: "none", cursor: "pointer",
        background: tweaks[k] ? "hsl(var(--cyan))" : "hsl(var(--graphite))",
        position: "relative", transition: "background 160ms",
      }}>
        <span style={{ position: "absolute", top: 2, left: tweaks[k] ? 16 : 2, width: 14, height: 14, borderRadius: "50%", background: "white", transition: "left 160ms" }} />
      </button>
    </label>
  );
  return (
    <div style={{
      position: "fixed", right: 20, bottom: 20, width: 280, zIndex: 100,
      background: "hsl(var(--midnight))", border: "1px solid hsl(var(--graphite))", borderRadius: 12,
      boxShadow: "0 20px 50px hsl(0 0% 0% / 0.5), 0 0 0 1px hsl(var(--cyan) / 0.05)",
      overflow: "hidden",
    }}>
      <div style={{ padding: "12px 16px", borderBottom: "1px solid hsl(var(--graphite))", display: "flex", justifyContent: "space-between", alignItems: "center", background: "hsl(var(--obsidian))" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: "hsl(var(--gold))", boxShadow: "0 0 8px hsl(var(--gold) / 0.6)" }} />
          <span style={{ fontSize: 12, fontWeight: 500, letterSpacing: "0.12em", textTransform: "uppercase" }}>Tweaks</span>
        </div>
        <button onClick={onClose} style={{ background: "transparent", border: "none", color: "hsl(var(--text-3))", cursor: "pointer", fontSize: 16, lineHeight: 1, padding: 0 }}>×</button>
      </div>
      <Section title="Layout">
        <Radio label="Density" k="density" options={[{ v: "compact", l: "Compact" }, { v: "cozy", l: "Cozy" }, { v: "comfy", l: "Comfy" }]} />
      </Section>
      <Section title="Theming">
        <Radio label="Accent" k="accent" options={[{ v: "cyan", l: "Cyan" }, { v: "gold", l: "Gold" }, { v: "duo", l: "Duo" }]} />
        <Radio label="Status badges" k="badgeStyle" options={[{ v: "filled", l: "Filled" }, { v: "soft", l: "Soft" }, { v: "dot", l: "Dot" }]} />
      </Section>
      <Section title="Behavior">
        <Toggle label="Sparklines in jobs table" k="showSparklines" />
        <Toggle label="Animated logo orbits" k="logoAnimated" />
        <Radio label="Row hover" k="rowHover" options={[{ v: "subtle", l: "Subtle" }, { v: "scan", l: "Scan" }, { v: "off", l: "Off" }]} />
      </Section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
