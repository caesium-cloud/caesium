<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="nucleus-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle glow behind nucleus -->
  <circle cx="256" cy="256" r="60" fill="url(#nucleus-glow)"/>

  <!-- Orbital rings -->
  <ellipse cx="256" cy="256" rx="210" ry="70"
    stroke="url(#orbit-grad)" stroke-width="3.5" opacity="0.85"
    transform="rotate(-60 256 256)"/>
  <ellipse cx="256" cy="256" rx="210" ry="70"
    stroke="url(#orbit-grad)" stroke-width="3.5" opacity="0.85"/>
  <ellipse cx="256" cy="256" rx="210" ry="70"
    stroke="url(#orbit-grad)" stroke-width="3.5" opacity="0.85"
    transform="rotate(60 256 256)"/>

  <!-- Nucleus -->
  <circle cx="256" cy="256" r="18" fill="#00B4D8"/>

  <!-- Electrons — positioned at major axis endpoints of each orbit -->
  <circle cx="361" cy="74" r="9" fill="#F59E0B"/>
  <circle cx="46" cy="256" r="9" fill="#F59E0B"/>
  <circle cx="361" cy="438" r="9" fill="#F59E0B"/>
</svg>
