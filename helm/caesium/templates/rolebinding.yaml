{{- if .Values.kubernetes.engine.enabled }}
{{- $engineNS := default .Release.Namespace .Values.kubernetes.engine.namespace }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "caesium.fullname" . }}-engine
  namespace: {{ $engineNS }}
  labels:
    {{- include "caesium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "caesium.fullname" . }}-engine
subjects:
  - kind: ServiceAccount
    name: {{ include "caesium.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
