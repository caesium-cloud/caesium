{{- if .Values.kubernetes.engine.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "caesium.fullname" . }}-engine
  labels:
    {{- include "caesium.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
{{- end }}
